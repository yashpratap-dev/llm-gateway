server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: llm-gateway

  datasource:
    url: jdbc:postgresql://localhost:5433/llmgateway
    username: llmgateway
    password: llmgateway
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6380
      password:
      timeout: 2000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: llm-gateway
    distribution:
      percentiles-histogram:
        llm.request.latency: true
      percentiles:
        llm.request.latency: 0.5,0.95,0.99

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

providers:
  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
    timeout-seconds: 30
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: gpt-4o-mini
    timeout-seconds: 30
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: https://api.anthropic.com
    default-model: claude-3-5-sonnet-20241022
    timeout-seconds: 30
    max-output-tokens: 1024
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com
    api-version: v1beta
    default-model: gemini-1.5-flash
    timeout-seconds: 30
    max-output-tokens: 1024

resilience4j:
  circuitbreaker:
    instances:
      groq:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      openai:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      groq-provider:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      openai-provider:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      claude-provider:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      gemini-provider:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    instances:
      groq:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      openai:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      groq-provider:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - dev.yashpratap.llmgateway.provider.exception.ProviderTimeoutException
          - dev.yashpratap.llmgateway.provider.exception.ProviderUnavailableException
      openai-provider:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - dev.yashpratap.llmgateway.provider.exception.ProviderTimeoutException
          - dev.yashpratap.llmgateway.provider.exception.ProviderUnavailableException
      claude-provider:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - dev.yashpratap.llmgateway.provider.exception.ProviderTimeoutException
          - dev.yashpratap.llmgateway.provider.exception.ProviderUnavailableException
      gemini-provider:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - dev.yashpratap.llmgateway.provider.exception.ProviderTimeoutException
          - dev.yashpratap.llmgateway.provider.exception.ProviderUnavailableException
  timelimiter:
    instances:
      groq:
        timeoutDuration: 30s
      openai:
        timeoutDuration: 30s

cache:
  semantic:
    enabled: true
    similarity-threshold: 0.92
    ttl-hours: 24
    max-entries-per-tenant: 10000
    model-isolation: true
    embedding-model-version: text-embedding-3-small
    embedding-cache:
      ttl: 24h
    eviction:
      # Spring 6-field cron: seconds minutes hours day month weekday
      # Different from Linux cron which uses 5 fields (no seconds field)
      cron: "0 0 * * * *"          # default: top of every hour
    embedding:
      model: text-embedding-3-small
      dimensions: 1536
      timeout-ms: 500

logging:
  level:
    dev.yashpratap: DEBUG
    org.springframework.security: INFO
